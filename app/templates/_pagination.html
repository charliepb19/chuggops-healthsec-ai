{% if pagination.total_pages > 1 %}
<div style="
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; border-top:1px solid var(--border);
  background:var(--bg-surface);
">
  <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:0.15em;">
    {{ pagination.total }} TOTAL &nbsp;·&nbsp; PAGE {{ pagination.page }} OF {{ pagination.total_pages }}
  </div>
  <div style="display:flex;gap:8px;">
    {% if pagination.has_prev %}
    <a href="?{{ base_query }}&page={{ pagination.page - 1 }}" style="
      font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em;
      color:var(--text-secondary); border:1px solid var(--border);
      background:var(--bg-panel); border-radius:var(--radius);
      padding:5px 14px; transition:all var(--transition);
    "
    onmouseover="this.style.color='var(--text-primary)';this.style.borderColor='var(--border-bright)'"
    onmouseout="this.style.color='var(--text-secondary)';this.style.borderColor='var(--border)'">
      ← PREV
    </a>
    {% endif %}
    {% if pagination.has_next %}
    <a href="?{{ base_query }}&page={{ pagination.page + 1 }}" style="
      font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em;
      color:var(--text-secondary); border:1px solid var(--border);
      background:var(--bg-panel); border-radius:var(--radius);
      padding:5px 14px; transition:all var(--transition);
    "
    onmouseover="this.style.color='var(--text-primary)';this.style.borderColor='var(--border-bright)'"
    onmouseout="this.style.color='var(--text-secondary)';this.style.borderColor='var(--border)'">
      NEXT →
    </a>
    {% endif %}
  </div>
</div>
{% endif %}
