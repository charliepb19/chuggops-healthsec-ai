<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ChuggOps HealthSec AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Philosopher:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-void:       #07061a;
      --bg-panel:      #0e0c24;
      --bg-surface:    #141230;
      --border:        #262360;
      --border-bright: #4a4490;
      --green:         #c084fc;
      --green-dim:     #9333ea;
      --green-muted:   #1e0f42;
      --green-glow:    rgba(192, 132, 252, 0.13);
      --red:           #ff6b8a;
      --text-primary:  #ede9fe;
      --text-secondary:#9987c7;
      --text-dim:      #524b82;
      --font-mono:     'JetBrains Mono', monospace;
      --font-display:  'Philosopher', serif;
      --font-body:     'Nunito', sans-serif;
      --radius:        8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(45deg,  rgba(192, 132, 252, 0.025) 1px, transparent 1px),
        linear-gradient(-45deg, rgba(192, 132, 252, 0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Ambient cursed energy glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(
        ellipse at 50% 40%,
        rgba(192, 132, 252, 0.09) 0%,
        transparent 65%
      );
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      animation: rise 350ms cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: 0 0 60px rgba(192, 132, 252, 0.08);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gradient top accent */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg,
        transparent 0%, var(--green) 40%, var(--green-dim) 60%, transparent 100%
      );
    }

    .card-head {
      padding: 36px 32px 28px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .logo-tag {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--green);
      letter-spacing: 0.3em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: 30px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-primary); line-height: 1.1;
      margin-bottom: 6px;
    }

    .logo-name span { color: var(--green); }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 9px; color: var(--text-dim);
      letter-spacing: 0.15em; text-transform: uppercase;
    }

    .card-body { padding: 28px 32px 32px; }

    .flash {
      background: rgba(255, 107, 138, 0.08);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input::placeholder { color: var(--text-dim); }

    input:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 0 3px var(--green-muted);
    }

    input[type="password"] { letter-spacing: 0.15em; }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: #07061a;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 200ms ease, box-shadow 200ms ease;
      margin-top: 8px;
    }

    .btn-submit:hover {
      opacity: 0.88;
      box-shadow: 0 0 24px rgba(192, 132, 252, 0.35);
    }

    .btn-submit:active { opacity: 0.75; }

    .card-foot {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .foot-note {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .status-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
      margin-right: 5px;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 6px var(--green); }
      50%       { opacity: 0.4; box-shadow: 0 0 2px var(--green); }
    }

    .time-display {
      text-align: center;
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
<div class="page">
  <div style="width:100%; max-width:400px;">

    <div class="card">
      <div class="card-head">
        <div class="logo-tag">// Secure Authentication</div>
        <div class="logo-name">Chugg<span>Ops</span></div>
        <div class="logo-sub">HealthSec AI — Security Operations</div>
      </div>

      <div class="card-body">
        {% if error %}
        <div class="flash">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
              placeholder="staff.username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
              placeholder="••••••••••••" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-submit">Authenticate →</button>
        </form>
      </div>

      <div class="card-foot">
        <div class="foot-note">
          <span class="status-dot"></span>TLS 1.3 Encrypted
        </div>
        <div class="foot-note">HIPAA Compliant</div>
      </div>
    </div>

    <div class="time-display" id="login-clock"></div>
  </div>
</div>

<script>
  function tick() {
    const now = new Date();
    document.getElementById('login-clock').textContent =
      now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
